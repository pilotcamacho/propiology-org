version: 1
applications:
  - appRoot: portal
    backend:
      phases:
        build:
          commands:
            - nvm install 20
            - nvm use 20
            - cd amplify && npm install && find node_modules -mindepth 2 -path "*/node_modules/graphql" -type d -prune | xargs -r rm -rf
            - cd amplify && npm exec -- ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths: []
