version: 1
applications:
  - appRoot: portal
    backend:
      phases:
        build:
          commands:
            - nvm install 20
            - nvm use 20
            - npm install
            - rm -rf node_modules/@aws-amplify/backend-data/node_modules/@aws-amplify/data-construct/node_modules/graphql
            - rm -rf node_modules/@aws-amplify/backend-data/node_modules/@aws-amplify/graphql-api-construct/node_modules/graphql
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .npm/**/*
          - node_modules/**/*
